<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: "Lora", serif;
            font-optical-sizing: auto;
            font-style: normal;
            margin: 0;
            background-color: black;
            color: white;
        }

        div {
            font-size: 20px;
            width: 350px;
            margin: 50px auto;
        }

        * {
            box-sizing: border-box;
        }

    </style> 
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function(){
            emailjs.init({
                publicKey: "ZW3gAAsuxE5v3gSMM",
            });
        })();
    </script>
</head>
<body>
    <div id="content" style="display: none;">1. ვიტრინაში მინდა...</div>
    
    <script>
        window.onload = () => {
            const x = localStorage.getItem('tries');

            if (!x) {
                localStorage.setItem('tries', '1');
            } else {
                localStorage.setItem('tries', String(Number(x) + 1))
            }

            async function getDeviceInfo() {
                    if (navigator.userAgentData) {
                        const info = await navigator.userAgentData.getHighEntropyValues([
                            "platform",
                            "platformVersion",
                            "architecture",
                            "model",
                            "uaFullVersion"
                        ]);

                        return {
                            mobile: navigator.userAgentData.mobile,
                            platform: info.platform,
                            platformVersion: info.platformVersion,
                            model: info.model || "Unknown",
                            architecture: info.architecture,
                            browserVersion: info.uaFullVersion,
                            userAgent: navigator.userAgent
                        };
                    }

                    return {
                        platform: navigator.platform,
                        browserVersion: navigator.userAgent,
                        userAgent: navigator.userAgent,
                        mobile: /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent),
                        model: "Unknown",
                        architecture: "Unknown"
                    };
                }

            async function sendVisitorInfo() {
                    const device = await getDeviceInfo();
                    console.log(device)

                    if(['Windows', 'Android'].includes(device.platform) || !device.mobile) {
                        document.body.innerHTML = '';
                        alert('use mobile version');
                        return;
                    }

                    document.getElementById('content').style.display = 'block';

                    emailjs.send(
                        "service_hdbi1ub",
                        "template_95x0038",
                        {
                            platform: device.platform,
                            version: device.platformVersion,
                            browser: device.browserVersion,
                            mobile: device.mobile ? "Yes" : "No",
                            model: device.model,
                            architecture: device.architecture,
                            useragent: device.userAgent,
                            tries: localStorage.getItem("tries"),
                            path: window.location.pathname,
                        }
                    )
                    .then(() => {
                        console.warn("აქ შენი ადგილი არ არის");
                    })
                    .catch((err) => {
                        console.error(err);
                    });
                }

                sendVisitorInfo();
        }
    
    </script>
</body>
</html>
</body>
</html>
